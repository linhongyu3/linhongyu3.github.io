backend:
  name: github
  repo: linhongyu3/linhongyu3.github.io
  branch: main
  client_id: Ov23li9SyL7RzvbQWLU4

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "posts"
    label: "博客文章"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: title, label: "标题", widget: text }
      - { name: date, label: "日期", widget: datetime, default: "", format: "yyyy-MM-dd HH:mm:ss Z"}
      - { name: categories, label: "分类", widget: list, default: ["技术"] }
      - { name: tags, label: "标签", widget: list }
      - { name: body, label: "正文", widget: markdown }
