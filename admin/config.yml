backend:
  name: github
  repo: linhongyu3/linhongyu3.github.io
  branch: main
  base_url: "https://linhongyu3.github.io"

locale: zh-CN

media_folder: assets/img/uploads
public_folder: /assets/img/uploads

collections:
  # ========== 文章 ==========
  - name: posts
    label: 文章
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: 技术
        field: categories
        pattern: 技术
      - label: 折腾
        field: categories
        pattern: 折腾
      - label: 生活
        field: categories
        pattern: 生活
    view_groups:
      - label: 按分类
        field: categories
      - label: 按年份
        field: date
        pattern: "\\d{4}"
    fields:
      - label: 基本信息
        name: info
        widget: object
        collapsed: false
        fields:
          - {name: title, label: 标题, widget: string, required: true}
          - {name: date, label: 发布日期, widget: datetime, format: "yyyy-MM-dd HH:mm:ss Z", required: true, default: "{{now}}" }
          - {name: categories, label: 分类, widget: select, options: [技术, 折腾, 生活], default: 技术}
          - {name: tags, label: 标签, widget: list, hint: "按回车添加多个标签", collapsed: true}
      - label: 正文内容
        name: body
        widget: markdown
        required: true
        hint: "支持 Markdown 语法，可使用工具栏插入图片、链接等"
        editor_components:
          - image
          - code-block
        modes:
          - rich_text
          - raw

  # ========== 镜像源 ==========
  - name: mirrors
    label: 镜像源
    files:
      - label: gh-proxy v6
        name: gh-proxy-v6
        file: _mirrors/gh-proxy-v6.md
        fields:
          - {name: name, label: 加速源名称, widget: string}
          - {name: url, label: 加速源URL, widget: string, hint: "以 / 结尾"}
          - {name: default, label: 设为默认, widget: boolean, default: false}
      - label: gh-proxy v1
        name: gh-proxy-v1
        file: _mirrors/gh-proxy-v1.md
        fields:
          - {name: name, label: 加速源名称, widget: string}
          - {name: url, label: 加速源URL, widget: string, hint: "以 / 结尾"}
          - {name: default, label: 设为默认, widget: boolean, default: false}
      - label: ghproxy
        name: ghproxy
        file: _mirrors/ghproxy.md
        fields:
          - {name: name, label: 加速源名称, widget: string}
          - {name: url, label: 加速源URL, widget: string, hint: "以 / 结尾"}
          - {name: default, label: 设为默认, widget: boolean, default: false}
      - label: mirror.ghproxy
        name: mirror-ghproxy
        file: _mirrors/mirror-ghproxy.md
        fields:
          - {name: name, label: 加速源名称, widget: string}
          - {name: url, label: 加速源URL, widget: string, hint: "以 / 结尾"}
          - {name: default, label: 设为默认, widget: boolean, default: false}
      - label: moeyy
        name: moeyy
        file: _mirrors/moeyy.md
        fields:
          - {name: name, label: 加速源名称, widget: string}
          - {name: url, label: 加速源URL, widget: string, hint: "以 / 结尾"}
          - {name: default, label: 设为默认, widget: boolean, default: false}

  # ========== 软件清单 ==========
  - name: downloads
    label: 软件清单
    files:
      - label: ClassRoomControl
        name: classroomcontrol
        file: _downloads/classroomcontrol.md
        fields:
          - {name: name, label: 软件名称, widget: string}
          - {name: description, label: 软件描述, widget: text, required: false}
          - {name: category, label: 分类, widget: select, options: [{label: 自制, value: self-made}, {label: 转载, value: repost}], default: self-made}
          - {name: url, label: 下载链接, widget: string, hint: "GitHub Releases 原始链接"}
          - {name: size, label: 文件大小, widget: string, required: false}
          - {name: version, label: 版本号, widget: string, required: false}
          - {name: date, label: 发布日期, widget: datetime, format: "YYYY-MM-DD", required: false}
      - label: TestRepost
        name: testrepost
        file: _downloads/testrepost.md
        fields:
          - {name: name, label: 软件名称, widget: string}
          - {name: description, label: 软件描述, widget: text, required: false}
          - {name: category, label: 分类, widget: select, options: [{label: 自制, value: self-made}, {label: 转载, value: repost}], default: self-made}
          - {name: url, label: 下载链接, widget: string, hint: "GitHub Releases 原始链接"}
          - {name: size, label: 文件大小, widget: string, required: false}
          - {name: version, label: 版本号, widget: string, required: false}
          - {name: date, label: 发布日期, widget: datetime, format: "YYYY-MM-DD", required: false}
