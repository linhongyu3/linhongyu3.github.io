backend:
  name: github
  repo: linhongyu3/linhongyu3.github.io
  branch: main
  base_url: "https://linhongyu3.github.io"

locale: zh-CN

media_folder: assets/img/uploads
public_folder: /assets/img/uploads

collections:
  - name: posts
    label: 文章
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {name: title,        label: 标题,   widget: text}
      - {name: date,          label: 日期,   widget: datetime, format: "yyyy-MM-dd HH:mm:ss Z"}
      - {name: categories,   label: 分类,   widget: select, options: [技术, 折腾, 生活], default: 技术}
      - {name: tags,         label: 标签,   widget: list}
      - {name: body,          label: 正文,   widget: markdown}

  - name: downloads
    label: 下载管理
    file: _data/downloads.yml
    fields:
      - {name: cdn_prefix, label: GitHub加速前缀, widget: string, hint: "例如: https://mirror.example.com，留空则不加速"}
      - label: 下载列表
        name: items
        widget: list
        fields:
          - {name: name,        label: 文件名称,   widget: string}
          - {name: description, label: 文件描述,   widget: text,   required: false}
          - {name: url,         label: 下载链接,   widget: string}
          - {name: size,        label: 文件大小,   widget: string, required: false, hint: "如: 1.0 MB"}
          - {name: version,     label: 版本号,     widget: string, required: false}
          - {name: date,        label: 发布日期,   widget: string, required: false, hint: "如: 2024-01-01"}
