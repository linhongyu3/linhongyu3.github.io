backend:
  name: github
  repo: linhongyu3/linhongyu3.github.io
  branch: main
  base_url: "https://linhongyu3.github.io"

locale: zh-CN

media_folder: assets/img/uploads
public_folder: /assets/img/uploads

collections:
  # ========== 文章 ==========
  - name: posts
    label: 文章
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: 技术
        field: categories
        pattern: 技术
      - label: 折腾
        field: categories
        pattern: 折腾
      - label: 生活
        field: categories
        pattern: 生活
    view_groups:
      - label: 按分类
        field: categories
      - label: 按年份
        field: date
        pattern: "\\d{4}"
    fields:
      - label: 基本信息
        name: info
        widget: object
        collapsed: false
        fields:
          - {name: title, label: 标题, widget: string, required: true}
          - {name: date, label: 发布日期, widget: datetime, format: "yyyy-MM-dd HH:mm:ss Z", required: true, default: "{{now}}" }
          - {name: categories, label: 分类, widget: select, options: [技术, 折腾, 生活], default: 技术}
          - {name: tags, label: 标签, widget: list, hint: "按回车添加多个标签", collapsed: true}
      - label: 正文内容
        name: body
        widget: markdown
        required: true
        hint: "支持 Markdown 语法，可使用工具栏插入图片、链接等"
        editor_components:
          - image
          - code-block
        modes:
          - rich_text
          - raw

  # ========== 镜像源 ==========
  - name: mirrors
    label: 镜像源
    files:
      - label: "镜像清单"
        name: "mirrors"
        file: _data/mirrors.yml
        fields:
          - {name: default_mirror, label: 默认加速源, widget: string, hint: "填写加速源名称，如 gh-proxy v6"}
          - label: 加速源列表
            name: mirrors
            widget: list
            fields:
              - {name: name, label: 加速源名称, widget: string}
              - {name: url, label: 加速源URL, widget: string, hint: "以 / 结尾，如 https://v6.gh-proxy.org/"}

  # ========== 软件清单 ==========
  - name: downloads
    label: 软件清单
    files:
      - label: "软件清单"
        name: "downloads"
        file: _data/downloads.yml
        fields:
          - label: 软件列表
            name: items
            widget: list
            fields:
              - {name: name, label: 软件名称, widget: string}
              - {name: description, label: 软件描述, widget: text, required: false}
              - {name: category, label: 分类, widget: select, options: [{label: 自制, value: self-made}, {label: 转载, value: repost}], default: self-made}
              - {name: url, label: 下载链接, widget: string, hint: "GitHub Releases 原始链接"}
              - {name: size, label: 文件大小, widget: string, required: false, hint: "如: 55.8MB"}
              - {name: version, label: 版本号, widget: string, required: false, hint: "如: v1.0.3"}
              - {name: date, label: 发布日期, widget: string, required: false, hint: "如: 2026-5-31"}
              - label: 合集链接（可选，多版本下载）
                name: links
                widget: list
                required: false
                hint: "如需提供多个版本下载，在此添加"
                fields:
                  - {name: name, label: 版本名称, widget: string}
                  - {name: url, label: 下载链接, widget: string}
                  - {name: size, label: 文件大小, widget: string}
