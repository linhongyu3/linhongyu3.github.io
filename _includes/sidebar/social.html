{% comment %} _includes/sidebar/social.html {% endcomment %}
{% if site.data.contact %}
<div class="sidebar-social">
  <ul class="list-inline">
    {% for contact in site.data.contact %}
      <li class="list-inline-item">
        {% if contact.type == "bilibili" %}
          {# B站专用 SVG（粉色小电视） #}
          <a href="{{ contact.url }}" target="_blank" rel="noopener noreferrer" title="Bilibili"
             style="display:inline-flex;align-items:center;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.813 4.767h-2.126a.48.48 0 01-.477-.477V2.88a.48.48 0 00-.477-.48H9.267a.48.48 0 00-.477.48v1.41a.48.48 0 01-.477.477H6.187A3.188 3.188 0 003 7.955v8.99a3.188 3.188 0 003.187 3.188h11.626A3.188 3.188 0 0021 16.945v-8.99a3.188 3.188 0 00-3.187-3.188z" fill="#00A1D6"/>
              <path d="M9.688 8.568a1.43 1.43 0 012.858 0v4.297a1.43 1.43 0 01-2.858 0V8.568zM13.03 8.568a1.43 1.43 0 012.858 0v4.297a1.43 1.43 0 01-2.858 0V8.568z" fill="#fff"/>
            </svg>
          </a>
        {% else %}
          {# 其他常规图标 #}
          <a href="{{ contact.url }}" target="_blank" rel="noopener noreferrer">
            <i class="fa-fw {{ contact.icon }}"></i>
          </a>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</div>
{% endif %}
